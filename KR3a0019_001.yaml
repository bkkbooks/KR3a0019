body:
  text: 素履子卷上唐張弧撰履道素履子曰道本無名無名居天地之始天地之始號曰混元混元之初無形無象既分二儀能生萬象故云之為道初自混漠三皇依之設教五帝依之置治始於一化淳樸自然將明寒暑之期遂分隂陽之序上古聖人履之無言無教無心於物物來歸之不教於民民皆仰之此則履純樸皇道也畫卦之主嘗草之君皆履之而化成至於服牛乗馬履之而去强暴用之而除民害顓頊履之於忠順帝嚳履之於清和唐堯履謙順之道而垂裳虞舜履孝弟之道而授讓此履帝道也禹行勤儉之道而治水湯能恭敬而感天西伯以至徳而稱尊武王以孝道而去虐此聖人以王道設教使老有所終壯有所用㓜有所長鰥寡孤獨廢疾者皆有所養男有分女有歸此以道治世之化也至於黄老唯尚樸而不文素王亦歸之於純素莫不去華飾而作教捨文艶以歸真不尚賢使人不争不貴難得之貨使人不盗責山節藻棁之宇尚卑宫菲食之君道徳經云吾有三寳保而持之一曰慈二曰儉三曰不敢為天下先此則履道之原也兼曰吾有大患為吾有身及吾無身吾有何患此則至道者亡身履象外之道也至於餐霞食氣塞兌轉丸履離塵之道也昔鴟夷子在俗教民種植治生之道竟乗舟而去羅真人卜肆教人忠孝之道乃拔宅而昇此乃大道不器在物皆有知道不虚行物有𤣥應不在高臺廣厦之間東林西域之内近代淮南高公置延和閣求道非也立身行道之本未若君睦臣忠父慈子孝兄友弟恭夫順妻貞勤儉於家忠良於國昔夏殷文武得道而昌桀紂幽厲失道而亡夫如是道不可捨得之則昌失之則亡故聖人愛人惠俗施徳保位者也人之於道如魚之在水魚失水則亡人失道則䘮牢籠萬象以道治之謂之大道欲昌其身宜履而行之明矣履徳素履子曰太上貴徳徳者衆善所歸百福所集昔舜有羶徳而人歸之如蟻羶不慕蟻而蟻慕羶舜不慕民而民慕徳文王為西伯三分天下歸周者二西伯之徳猶種竹以待禽竹不慕禽禽為鸇所逐而自來投竹周不慕民民為紂所虐而自來投周是知徳可施而虐不可肆常以好生之徳洽於民心誕敷文徳逺方來格故古昔帝王皆立徳以垂教五行五帝在木曰木徳在火曰火徳在土曰土徳在金曰金徳在水曰水徳五行相生遞相為徳所以水火金木土榖正徳利用厚生謂之九功立教於萬祀此徳之用也徳之施也無名在物物皆得之則存失之則䘮天若失徳寒暑不時地若失徳萬物不生人若失徳身必將傾故大禹謀九功皋陶謀九徳天下是治君以慈愛立徳臣以忠孝成名徳唯善政政在養民養民之本在武則有七禁暴戢兵保大定功安民和衆豐財文則有五溫良恭儉讓恭寛信敏惠皆歸五徳徳也者能郤水火能感鬼神狎伏龍蛇化敷禽獸亦能退舍星象亦能整復山河桑榖自枯妖禽亦逝瘞蛇之子捨金之賔遺藥於敵人馳酒於盗者捨絶纓之過成漆身之志皆施之於隂功而獲陽報夫如是宜施之於萬類不可失之於一言天道無親唯徳是輔有國有家幸其履之瞬息無倦昌矣盛矣履忠素履子曰忠貞者天地之秀氣人倫之英靈凡觀厯世之書唯忠實者名挂史筆萬世常存則夫不忠者必滅亡也昔周公至忠事文王武王至成王成王自襁褓事之於三世盡忠金玉莫比其堅松竹莫比其操至於祝九齡之夀乃自翦為牲託六尺之孤遂去管蔡之佞事雖往古行跡常新列於典籍之中常為賢哲之範太公行王風而治周室主霸典而滅紂邦二人來輔於周功業垂於萬祀復聞管仲相桓公一匡天下以尊周子房佐劉氏統鴻溝以興漢至於召四皓而迴惠帝抱㓜主而朝諸侯亦有臥屍折檻之士碎首投鑊之臣今古所推實謂忠節若指鹿為馬以𤣥為黄脅弱欺孤廢賢奪義生則舂喉臠肉沒為後世責嫌汙辱二儀之中濫簉三才之内是知忠賢宜旌之不朽為今世間傑來世美談詩曰淑人君子其儀不忒賢者履之盛矣履孝素履子曰經云夫孝天之經也地之義也人之行也兼曰夫孝徳之本教之所由生治國治家者立徳為先立徳之本孝之為始昔舜禹有至徳至孝存身立徳而成皆以孝行舜讓而尊故云先王有至徳要道以順天下民用和睦上下無怨孝之始也孝感天地應乎神明天子孝龜龍負圖庶人孝草木榮茂昔曾子孝父母身體髮膚不敢毁傷至於終身跬歩之間不忘孝道一切禽獸草木取之以時不違天道竭力盡忠此為孝子之志也夫人有百行不孝者如玉屑盈匣終無用也能行孝道者自然神明上生天帝添筭身安事吉榮顯於時幸君子履之保百福矣素履子卷上
