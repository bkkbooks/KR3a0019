body:
  text: 素履子儒家類提要臣等謹案素履子三卷唐張弧撰其書新唐書藝文志晁公武讀書志陳振孫書録解題尤袤遂初堂書目皆未著録惟鄭樵藝文略宋史藝文志有之蓋其詞義平近出於後代不能與漢魏諸子抗衡故自宋以來不甚顯於世宋濓作諸子辨亦未之及然其援引經史根極理道要皆本聖賢垂訓之㫖而歸之於正亦儒家者流也弧唐書無傳宋晁說之謂世所傳子夏易傳乃弧偽作舊題其官為將仕郎試大理寺評事而里貫已不可考藝文略及宋志皆作一卷今本三卷殆後人所分析歟乾隆四十四年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:600925d65900efceb59c826d48ac14f8b6bb1e22e67035181bb6c834c632a22a
